<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Expense Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1><i class="fas fa-wallet"></i> Student Expense Tracker</h1>
      <p>Track your spending, save smarter!</p>
    </header>

    <div class="main-content">
      <div class="input-section">
        <h2><i class="fas fa-plus-circle"></i> Add New Expense</h2>
        <form id="expense-form">
          <div class="form-group">
            <label for="expense-name">Expense Name:</label>
            <input type="text" id="expense-name" required />
          </div>
          <div class="form-group">
            <label for="expense-amount">Amount (₹):</label>
            <input type="number" id="expense-amount" step="0.01" required />
          </div>
          <div class="form-group">
            <label for="expense-category">Category:</label>
            <select id="expense-category" required>
              <option value="">Select a category</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Books">Books & Supplies</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Housing">Housing</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="expense-date">Date:</label>
            <input type="date" id="expense-date" required />
          </div>
          <button type="submit" class="btn add-btn">Add Expense</button>
        </form>
      </div>

      <div class="summary-section">
        <h2><i class="fas fa-chart-pie"></i> Expense Summary</h2>
        <div class="summary-cards">
          <div class="card total-card">
            <h3>Total Spent</h3>
            <p id="total-amount">₹0.00</p>
          </div>
          <div class="card category-card">
            <h3>Top Category</h3>
            <p id="top-category">-</p>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="expense-chart"></canvas>
        </div>
      </div>
    </div>

    <div class="expenses-section">
      <h2><i class="fas fa-list"></i> Your Expenses</h2>
      <div class="filter-controls">
        <div class="form-group">
          <label for="filter-category">Filter by Category:</label>
          <select id="filter-category">
            <option value="all">All Categories</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Books">Books & Supplies</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Housing">Housing</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="filter-month">Filter by Month:</label>
          <select id="filter-month">
            <option value="all">All Months</option>
            <option value="0">January</option>
            <option value="1">February</option>
            <option value="2">March</option>
            <option value="3">April</option>
            <option value="4">May</option>
            <option value="5">June</option>
            <option value="6">July</option>
            <option value="7">August</option>
            <option value="8">September</option>
            <option value="9">October</option>
            <option value="10">November</option>
            <option value="11">December</option>
          </select>
        </div>
      </div>

      <table id="expenses-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Name</th>
            <th>Category</th>
            <th>Amount</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="expenses-list"></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
